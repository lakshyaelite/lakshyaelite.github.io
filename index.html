<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshya Singh Chauhan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="alert alert-warning alert-dismissible fade show text-center mb-0 rounded-0" role="alert">
    <i class="bi bi-cone-striped me-2"></i>
    <strong>Under Construction:</strong> This website is still being built and is subject to changes.
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm transition-all">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <span class="text-primary">&lt;</span>LAKSHYA<span class="text-primary">/&gt;</span>
            </a>
            <div class="d-flex align-items-center">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto px-2">
                    <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#certificates">Certificates</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <header class="hero text-center">
        <div class="container">
            <div class="profile-container mb-4">
                <img src="/lakshya.webp" alt="Profile Photo" class="profile-img shadow-lg">
            </div>
            <h1 class="display-3 fw-bold mb-2">Lakshya Singh Chauhan</h1>

            <p class="typing-container">
                I enjoy <span id="typed-output"></span><span class="cursor"></span>.
            </p>
            
            <div class="social-links mb-5">
                <a href="#" class="social-icon"><i class="bi bi-github"></i></a>
                <a href="#" class="social-icon"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="social-icon"><i class="bi bi-twitter"></i></a>
            </div>
            
            <div class="mt-4">
                <i class="bi bi-chevron-down down-arrow"></i>
            </div>
        </div>
    </header>

    <section id="projects" class="py-5">
        <div class="container">
            <div class="section-header text-center mb-5">
                <h2 class="fw-bold">Latest Projects</h2>
                <div class="underline mx-auto"></div>
            </div>
            <div class="row g-4 justify-content-center" id="project-container">
                </div>
        </div>
    </section>

    <section id="certificates" class="py-5 alternate-bg">
        <div class="container">
            <div class="section-header text-center mb-5">
                <h2 class="fw-bold">Certifications</h2>
                <div class="underline mx-auto"></div>
            </div>
            <div class="row g-4 justify-content-center" id="certificate-container">
                </div>
        </div>
    </section>

    <section id="contact" class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7">
                    <div class="contact-card p-5 shadow-lg border-0 rounded-4 text-center">
                        <h2 class="mb-4 fw-bold">Let's Collaborate</h2>
                        <form id="emailForm">
                            <div class="mb-3 text-start">
                                <label class="form-label fw-semibold">Subject</label>
                                <input type="text" id="subject" class="form-control form-control-lg border-0 input-field" placeholder="Project Inquiry" required>
                            </div>
                            <div class="mb-4 text-start">
                                <label class="form-label fw-semibold">Your Message</label>
                                <textarea id="message" class="form-control form-control-lg border-0 input-field" rows="4" placeholder="Tell me about your vision..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
                                <i class="bi bi-send me-2"></i>Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer py-3 text-center">
        <div class="container">
            <div class="mb-3">
                <a href="#" class="mx-2 fs-4 footer-link"><i class="bi bi-github"></i></a>
                <a href="#" class="mx-2 fs-4 footer-link"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="mx-2 fs-4 footer-link"><i class="bi bi-twitter"></i></a>
            </div>
            <p class="secondary-text mb-0">&copy; 2026 Lakshya Singh Chauhan</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
